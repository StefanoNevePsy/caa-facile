name: Build iOS IPA (Unsigned for LiveContainer)

on:
  workflow_dispatch: # Permette di avviare la build manualmente

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build React App
        run: npm run build

      - name: Setup Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          
          # 1. Inizializza
          npx cap init "CAA Facile" "com.caa.facile" --web-dir=dist
          
          # 2. Aggiungi iOS (ignora errori se esiste già)
          npx cap add ios || true

          # 3. FIX PROGETTO XCODE: 
          # Imposta il target di deployment a 16.0 modificando il file di progetto
          sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = 13.0;/IPHONEOS_DEPLOYMENT_TARGET = 16.0;/g' ios/App/App.xcodeproj/project.pbxproj

          # 4. Sincronizza tutto
          npx cap sync ios

      - name: Build xArchive (No Code Signing)
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath App.xcarchive \
            -destination 'generic/platform=iOS' \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cd ios/App
          mkdir Payload
          cp -r App.xcarchive/Products/Applications/App.app Payload/
          zip -r App.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: caa-app-ios
          path: ios/App/App.ipa
